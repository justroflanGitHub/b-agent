name: CI

on:
  push:
    branches: [main, enterprise-features, develop]
  pull_request:
    branches: [main, enterprise-features]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install flake8 black mypy
          pip install -r requirements.txt

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pytest pytest-timeout playwright -r requirements.txt
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short -x -k "not vision and not integration and not llm" --timeout=60

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile --target production -t browser-agent:latest .
      - name: Test Docker entrypoint
        run: docker run --rm browser-agent:latest test --help || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install safety
        run: pip install safety
      - name: Check dependencies
        run: safety check -r requirements.txt || true
