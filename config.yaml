# Browser Agent Configuration
# =========================

# Browser Settings
browser:
  viewport_width: 2560
  viewport_height: 1440
  headless: false
  browser_type: chromium  # chromium, firefox, webkit
  max_tabs: 3
  stealth_mode: true
  startup_timeout: 30

# LLM Settings
llm:
  provider: lmstudio
  base_url: http://127.0.0.1:1234
  model: mradermacher/ui-tars-1.5-7b
  vision_model: mradermacher/ui-tars-1.5-7b
  temperature: 0.1
  max_tokens: 4000
  timeout: 60
  retries: 3
  fallback_heuristic: true

# Resilience Settings
resilience:
  checkpoint_interval: 5
  max_retry_per_action: 3
  global_timeout: 300
  exponential_backoff_base: 0.5
  max_checkpoints: 50
  state_stack_depth: 100

# Action Settings
action:
  default_timeout: 5000
  scroll_amount: 500
  typing_delay: 50
  mouse_move_steps: 10
  wait_after_action: 0.5

# Logging Settings
logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: null
  max_file_size: 10485760
  backup_count: 5

# Additional Settings
debug_mode: false
data_dir: ./data
checkpoints_dir: ./checkpoints
screenshots_dir: ./screenshots
