version: '3.8'

services:
  browser-agent:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: ${DOCKER_TARGET:-production}
    container_name: browser-agent
    environment:
      - BROWSER_HEADLESS=true
      - DISPLAY=:99
      - PYTHONPATH=/app
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LLM_MODEL=${LLM_MODEL:-ui-tars-1.5-7b@f16}
      - BROWSER_AGENT_DEBUG=${DEBUG:-false}
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../screenshots:/app/screenshots
    ports:
      - "${API_PORT:-8080}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Test runner service
  browser-agent-test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: development
    container_name: browser-agent-test
    environment:
      - BROWSER_HEADLESS=true
      - DISPLAY=:99
      - PYTHONPATH=/app
      - LM_STUDIO_URL=${LM_STUDIO_URL:-http://host.docker.internal:1234}
      - LLM_MODEL=${LLM_MODEL:-ui-tars-1.5-7b@f16}
    volumes:
      - ..:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - test
    command: ["test"]

networks:
  default:
    name: browser-agent-network
