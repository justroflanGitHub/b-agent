<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SearchHub - Search & Research Test Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #fff;
            min-height: 100vh;
        }
        
        .search-header {
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 30px;
            border-bottom: 1px solid #eee;
        }
        
        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #4285f4;
        }
        
        .logo span:nth-child(2) { color: #ea4335; }
        .logo span:nth-child(3) { color: #fbbc05; }
        .logo span:nth-child(4) { color: #34a853; }
        
        .search-container {
            flex: 1;
            max-width: 600px;
        }
        
        .search-box {
            display: flex;
            border: 2px solid #ddd;
            border-radius: 25px;
            overflow: hidden;
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        
        .search-box:focus-within {
            border-color: #4285f4;
            box-shadow: 0 2px 8px rgba(66, 133, 244, 0.2);
        }
        
        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            font-size: 16px;
            outline: none;
        }
        
        .search-box button {
            padding: 12px 25px;
            background: #4285f4;
            color: white;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .search-box button:hover {
            background: #3367d6;
        }
        
        .nav-links {
            display: flex;
            gap: 20px;
        }
        
        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }
        
        .nav-links a:hover {
            color: #4285f4;
        }
        
        .results-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        .results-info {
            color: #666;
            font-size: 14px;
            margin-bottom: 20px;
        }
        
        .search-time {
            color: #999;
        }
        
        .result-item {
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .result-item:last-child {
            border-bottom: none;
        }
        
        .result-sponsored {
            display: inline-block;
            background: #f0f0f0;
            color: #666;
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
            margin-bottom: 5px;
        }
        
        .result-url {
            color: #202124;
            font-size: 14px;
            margin-bottom: 3px;
        }
        
        .result-url cite {
            color: #006621;
            font-style: normal;
        }
        
        .result-title {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .result-title a {
            color: #1a0dab;
            text-decoration: none;
        }
        
        .result-title a:hover {
            text-decoration: underline;
        }
        
        .result-title a:visited {
            color: #609;
        }
        
        .result-description {
            color: #545454;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .result-description b {
            color: #333;
        }
        
        .result-sitelinks {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        
        .sitelink {
            display: flex;
            flex-direction: column;
        }
        
        .sitelink a {
            color: #1a0dab;
            text-decoration: none;
            font-size: 14px;
        }
        
        .sitelink a:hover {
            text-decoration: underline;
        }
        
        .sitelink-desc {
            color: #545454;
            font-size: 12px;
        }
        
        .result-actions {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }
        
        .result-action {
            color: #666;
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
        }
        
        .result-action:hover {
            color: #4285f4;
        }
        
        .related-searches {
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        .related-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
        }
        
        .related-items {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .related-item {
            padding: 8px 16px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 20px;
            color: #333;
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .related-item:hover {
            background: #e8f0fe;
            border-color: #4285f4;
            color: #4285f4;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 40px;
            padding-bottom: 40px;
        }
        
        .pagination a {
            color: #4285f4;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 12px;
        }
        
        .pagination a:hover {
            text-decoration: underline;
        }
        
        .pagination a.active {
            color: #333;
            font-weight: 600;
            cursor: default;
        }
        
        .pagination a.active:hover {
            text-decoration: none;
        }
        
        .pagination .page-numbers {
            display: flex;
            gap: 5px;
        }
        
        .knowledge-panel {
            position: fixed;
            right: 40px;
            top: 100px;
            width: 350px;
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
        }
        
        .knowledge-title {
            font-size: 24px;
            color: #202124;
            margin-bottom: 10px;
        }
        
        .knowledge-subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .knowledge-facts {
            list-style: none;
        }
        
        .knowledge-facts li {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }
        
        .knowledge-facts li:last-child {
            border-bottom: none;
        }
        
        .fact-label {
            color: #666;
            display: inline-block;
            width: 100px;
        }
        
        .fact-value {
            color: #333;
        }
        
        @media (max-width: 1200px) {
            .knowledge-panel {
                display: none;
            }
        }
        
        @media (max-width: 768px) {
            .search-header {
                flex-direction: column;
                gap: 15px;
            }
            
            .search-container {
                width: 100%;
            }
            
            .nav-links {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <header class="search-header">
        <div class="logo">
            <span>S</span><span>e</span><span>a</span><span>r</span><span>c</span><span>h</span><span>H</span><span>u</span><span>b</span>
        </div>
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search anything..." value="machine learning">
                <button id="searchBtn">Search</button>
            </div>
        </div>
        <nav class="nav-links">
            <a href="#" class="active">All</a>
            <a href="#">Images</a>
            <a href="#">Videos</a>
            <a href="#">News</a>
        </nav>
    </header>
    
    <main class="results-container">
        <div class="results-info">
            About <span id="resultCount">10,450,000</span> results
            <span class="search-time">(<span id="searchTime">0.42</span> seconds)</span>
        </div>
        
        <div class="search-results" id="searchResults">
            <!-- Results will be dynamically generated -->
        </div>
        
        <div class="related-searches">
            <h3 class="related-title">Related searches</h3>
            <div class="related-items" id="relatedSearches">
                <!-- Related searches will be dynamically generated -->
            </div>
        </div>
        
        <div class="pagination">
            <a href="#" onclick="goToPage(1)">← Previous</a>
            <div class="page-numbers" id="pageNumbers">
                <!-- Page numbers will be dynamically generated -->
            </div>
            <a href="#" onclick="goToPage(3)">Next →</a>
        </div>
    </main>
    
    <aside class="knowledge-panel" id="knowledgePanel">
        <!-- Knowledge panel will be dynamically generated -->
    </aside>
    
    <script>
        // Search results data
        const searchResults = {
            "machine learning": [
                {
                    id: 1,
                    sponsored: true,
                    url: "https://www.coursera.org/learn/machine-learning",
                    displayUrl: "coursera.org › learn › machine-learning",
                    title: "Machine Learning Course by Stanford University",
                    description: "Learn <b>machine learning</b> from Stanford University. This course covers the fundamentals of <b>ML</b> including supervised learning, unsupervised learning, and best practices.",
                    sitelinks: [
                        { title: "Syllabus", desc: "View course syllabus" },
                        { title: "Enroll Now", desc: "Start learning today" }
                    ]
                },
                {
                    id: 2,
                    sponsored: false,
                    url: "https://en.wikipedia.org/wiki/Machine_learning",
                    displayUrl: "en.wikipedia.org › wiki › Machine_learning",
                    title: "Machine learning - Wikipedia",
                    description: "<b>Machine learning</b> (ML) is a field of study in artificial intelligence concerned with the development of algorithms and statistical models that computer systems use to perform tasks without explicit instructions.",
                    sitelinks: [
                        { title: "History", desc: "Origins and development" },
                        { title: "Applications", desc: "Real-world uses" },
                        { title: "Approaches", desc: "ML methods" },
                        { title: "Ethics", desc: "Ethical considerations" }
                    ]
                },
                {
                    id: 3,
                    sponsored: false,
                    url: "https://www.ibm.com/topics/machine-learning",
                    displayUrl: "ibm.com › topics › machine-learning",
                    title: "What is Machine Learning? | IBM",
                    description: "<b>Machine learning</b> is a branch of artificial intelligence (AI) and computer science which focuses on the use of data and algorithms to imitate the way that humans learn, gradually improving its accuracy."
                },
                {
                    id: 4,
                    sponsored: false,
                    url: "https://www.tensorflow.org/learn",
                    displayUrl: "tensorflow.org › learn",
                    title: "TensorFlow - Machine Learning for Everyone",
                    description: "An end-to-end open source <b>machine learning</b> platform for everyone. Explore TensorFlow's ecosystem of tools, libraries, and community resources.",
                    sitelinks: [
                        { title: "Tutorials", desc: "Get started" },
                        { title: "API Docs", desc: "Reference guides" }
                    ]
                },
                {
                    id: 5,
                    sponsored: false,
                    url: "https://scikit-learn.org/",
                    displayUrl: "scikit-learn.org",
                    title: "scikit-learn: Machine Learning in Python",
                    description: "Simple and efficient tools for predictive data analysis. Accessible to everybody, and reusable in various contexts. Built on NumPy, SciPy, and matplotlib."
                },
                {
                    id: 6,
                    sponsored: false,
                    url: "https://www.aws.amazon.com/what-is/machine-learning",
                    displayUrl: "aws.amazon.com › what-is › machine-learning",
                    title: "What is Machine Learning? - AWS",
                    description: "<b>Machine learning</b> (ML) is the process of using mathematical models of data to help a computer learn without direct instruction. Learn about <b>ML</b> on AWS."
                },
                {
                    id: 7,
                    sponsored: false,
                    url: "https://www.investopedia.com/terms/m/machine-learning.asp",
                    displayUrl: "investopedia.com › terms › machine-learning",
                    title: "Machine Learning: What It Is and How It Works",
                    description: "<b>Machine learning</b> is the concept that a computer program can learn and adapt to new data without human intervention. It is a field of artificial intelligence that keeps a computer's built-in algorithms current."
                },
                {
                    id: 8,
                    sponsored: false,
                    url: "https://www.pytorch.org/",
                    displayUrl: "pytorch.org",
                    title: "PyTorch - From Research to Production",
                    description: "An open source <b>machine learning</b> framework that accelerates the path from research prototyping to production deployment. Developed by Facebook's AI Research lab."
                },
                {
                    id: 9,
                    sponsored: false,
                    url: "https://www.nvidia.com/en-us/glossary/machine-learning",
                    displayUrl: "nvidia.com › glossary › machine-learning",
                    title: "What is Machine Learning? | NVIDIA Glossary",
                    description: "<b>Machine learning</b> is the practice of using algorithms to parse data, learn from it, and then make a determination or prediction about something in the world."
                },
                {
                    id: 10,
                    sponsored: false,
                    url: "https://www.forbes.com/sites/bernardmarr/2026/machine-learning",
                    displayUrl: "forbes.com › sites › bernardmarr",
                    title: "The Top 10 Machine Learning Trends of 2026",
                    description: "Discover the latest trends in <b>machine learning</b> including generative AI, edge computing, and automated <b>ML</b>. Expert analysis on where the industry is heading."
                }
            ],
            "python": [
                {
                    id: 1,
                    sponsored: false,
                    url: "https://www.python.org/",
                    displayUrl: "python.org",
                    title: "Welcome to Python.org",
                    description: "The official home of the <b>Python</b> programming language. Download <b>Python</b>, read documentation, and join the community.",
                    sitelinks: [
                        { title: "Download", desc: "Get Python" },
                        { title: "Documentation", desc: "Official docs" }
                    ]
                },
                {
                    id: 2,
                    sponsored: true,
                    url: "https://www.codecademy.com/learn/learn-python-3",
                    displayUrl: "codecademy.com › learn › python-3",
                    title: "Learn Python 3 | Codecademy",
                    description: "Learn <b>Python 3</b> interactively with hands-on exercises. Start from the basics and advance to professional skills."
                }
            ]
        };
        
        const relatedSearches = {
            "machine learning": [
                "machine learning for beginners",
                "machine learning algorithms",
                "machine learning vs deep learning",
                "machine learning projects",
                "machine learning course free",
                "machine learning python",
                "types of machine learning",
                "machine learning applications"
            ],
            "python": [
                "python download",
                "python tutorial",
                "python for beginners",
                "python vs java",
                "python ide",
                "python libraries"
            ]
        };
        
        const knowledgePanels = {
            "machine learning": {
                title: "Machine learning",
                subtitle: "Field of study",
                facts: [
                    { label: "Field", value: "Artificial Intelligence" },
                    { label: "Founded", value: "1959" },
                    { label: "Subfields", value: "Deep learning, NLP, Computer vision" },
                    { label: "Applications", value: "Image recognition, Speech processing" },
                    { label: "Related", value: "Data science, Statistics" }
                ]
            },
            "python": {
                title: "Python (programming language)",
                subtitle: "Programming language",
                facts: [
                    { label: "Paradigm", value: "Multi-paradigm" },
                    { label: "Designed by", value: "Guido van Rossum" },
                    { label: "First appeared", value: "1991" },
                    { label: "Typing", value: "Dynamic, Strong" },
                    { label: "License", value: "Python Software Foundation" }
                ]
            }
        };
        
        let currentQuery = "machine learning";
        let currentPage = 1;
        
        // Render search results
        function renderResults(query) {
            const container = document.getElementById('searchResults');
            const results = searchResults[query] || searchResults["machine learning"];
            
            container.innerHTML = '';
            
            results.forEach(result => {
                const sitelinksHTML = result.sitelinks ? `
                    <div class="result-sitelinks">
                        ${result.sitelinks.map(link => `
                            <div class="sitelink">
                                <a href="${result.url}/${link.title.toLowerCase()}">${link.title}</a>
                                <span class="sitelink-desc">${link.desc}</span>
                            </div>
                        `).join('')}
                    </div>
                ` : '';
                
                const sponsoredHTML = result.sponsored ? '<span class="result-sponsored">Sponsored</span>' : '';
                
                const resultHTML = `
                    <div class="result-item" data-result-id="${result.id}">
                        ${sponsoredHTML}
                        <div class="result-url"><cite>${result.displayUrl}</cite></div>
                        <h3 class="result-title">
                            <a href="article.html?id=${result.id}&query=${encodeURIComponent(query)}">${result.title}</a>
                        </h3>
                        <p class="result-description">${result.description}</p>
                        ${sitelinksHTML}
                        <div class="result-actions">
                            <a class="result-action" href="#">Cached</a>
                            <a class="result-action" href="#">Similar</a>
                            <a class="result-action" href="#">Share</a>
                        </div>
                    </div>
                `;
                
                container.innerHTML += resultHTML;
            });
        }
        
        // Render related searches
        function renderRelatedSearches(query) {
            const container = document.getElementById('relatedSearches');
            const related = relatedSearches[query] || relatedSearches["machine learning"];
            
            container.innerHTML = related.map(term => `
                <a href="#" class="related-item" onclick="searchFor('${term}'); return false;">${term}</a>
            `).join('');
        }
        
        // Render knowledge panel
        function renderKnowledgePanel(query) {
            const container = document.getElementById('knowledgePanel');
            const knowledge = knowledgePanels[query] || knowledgePanels["machine learning"];
            
            container.innerHTML = `
                <h2 class="knowledge-title">${knowledge.title}</h2>
                <p class="knowledge-subtitle">${knowledge.subtitle}</p>
                <ul class="knowledge-facts">
                    ${knowledge.facts.map(fact => `
                        <li>
                            <span class="fact-label">${fact.label}</span>
                            <span class="fact-value">${fact.value}</span>
                        </li>
                    `).join('')}
                </ul>
            `;
        }
        
        // Render page numbers
        function renderPageNumbers() {
            const container = document.getElementById('pageNumbers');
            let html = '';
            
            for (let i = 1; i <= 10; i++) {
                const activeClass = i === currentPage ? 'active' : '';
                html += `<a href="#" class="${activeClass}" onclick="goToPage(${i}); return false;">${i}</a>`;
            }
            
            container.innerHTML = html;
        }
        
        // Search function
        function searchFor(query) {
            currentQuery = query;
            document.getElementById('searchInput').value = query;
            renderResults(query);
            renderRelatedSearches(query);
            renderKnowledgePanel(query);
            
            // Update result count randomly
            document.getElementById('resultCount').textContent = 
                (Math.floor(Math.random() * 100000) + 1000000).toLocaleString();
            document.getElementById('searchTime').textContent = 
                (Math.random() * 0.5 + 0.2).toFixed(2);
        }
        
        // Go to page
        function goToPage(page) {
            if (page < 1 || page > 10) return;
            currentPage = page;
            renderPageNumbers();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = document.getElementById('searchInput').value.toLowerCase();
            searchFor(query);
        });
        
        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = document.getElementById('searchInput').value.toLowerCase();
                searchFor(query);
            }
        });
        
        // Initialize
        renderResults(currentQuery);
        renderRelatedSearches(currentQuery);
        renderKnowledgePanel(currentQuery);
        renderPageNumbers();
        
        // Expose for testing
        window.searchFor = searchFor;
        window.goToPage = goToPage;
        window.getCurrentQuery = () => currentQuery;
        window.getCurrentPage = () => currentPage;
        window.getSearchResults = () => searchResults[currentQuery];
        
        // Mark page loaded
        window.searchResearchPageLoaded = true;
        window.dispatchEvent(new CustomEvent('searchResearchPageReady'));
    </script>
</body>
</html>
