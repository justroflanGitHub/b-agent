<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Workflow Automation Test Page</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }
        
        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .login-logo {
            font-size: 48px;
            margin-bottom: 10px;
        }
        
        .login-title {
            font-size: 24px;
            color: #333;
            margin-bottom: 5px;
        }
        
        .login-subtitle {
            color: #666;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group input.error {
            border-color: #e74c3c;
        }
        
        .error-message {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .error-message.visible {
            display: block;
        }
        
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .remember-me input {
            width: 16px;
            height: 16px;
        }
        
        .remember-me label {
            font-size: 14px;
            color: #666;
        }
        
        .forgot-password {
            color: #667eea;
            font-size: 14px;
            text-decoration: none;
        }
        
        .forgot-password:hover {
            text-decoration: underline;
        }
        
        .login-button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .login-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }
        
        .login-error {
            background: #fee;
            border: 1px solid #fcc;
            color: #c00;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .login-error.visible {
            display: block;
        }
        
        .login-success {
            background: #efe;
            border: 1px solid #cfc;
            color: #060;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        
        .login-success.visible {
            display: block;
        }
        
        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        
        .login-button.loading .loading-spinner {
            display: inline-block;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">🔐</div>
            <h1 class="login-title">Welcome Back</h1>
            <p class="login-subtitle">Sign in to access your dashboard</p>
        </div>
        
        <div class="login-error" id="loginError">
            Invalid username or password. Please try again.
        </div>
        
        <div class="login-success" id="loginSuccess">
            Login successful! Redirecting...
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required>
                <div class="error-message" id="usernameError">Username is required</div>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
                <div class="error-message" id="passwordError">Password is required</div>
            </div>
            
            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
                <a href="#" class="forgot-password">Forgot password?</a>
            </div>
            
            <button type="submit" class="login-button" id="loginBtn">
                <span class="loading-spinner"></span>
                Sign In
            </button>
        </form>
    </div>
    
    <script>
        // Valid credentials for testing
        const validCredentials = [
            { username: 'admin', password: 'admin123', role: 'admin' },
            { username: 'user', password: 'user123', role: 'user' },
            { username: 'demo', password: 'demo', role: 'user' },
            { username: 'test', password: 'test123', role: 'user' }
        ];
        
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loginError = document.getElementById('loginError');
        const loginSuccess = document.getElementById('loginSuccess');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberCheckbox = document.getElementById('remember');
        
        // Check for remembered credentials
        const rememberedUsername = localStorage.getItem('rememberedUsername');
        if (rememberedUsername) {
            usernameInput.value = rememberedUsername;
            rememberCheckbox.checked = true;
        }
        
        // Form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Hide previous messages
            loginError.classList.remove('visible');
            loginSuccess.classList.remove('visible');
            
            // Get input values
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            // Validate
            let isValid = true;
            
            if (!username) {
                usernameInput.classList.add('error');
                document.getElementById('usernameError').classList.add('visible');
                isValid = false;
            } else {
                usernameInput.classList.remove('error');
                document.getElementById('usernameError').classList.remove('visible');
            }
            
            if (!password) {
                passwordInput.classList.add('error');
                document.getElementById('passwordError').classList.add('visible');
                isValid = false;
            } else {
                passwordInput.classList.remove('error');
                document.getElementById('passwordError').classList.remove('visible');
            }
            
            if (!isValid) return;
            
            // Show loading state
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;
            
            // Simulate API call delay
            await new Promise(resolve => setTimeout(resolve, 1000));
            
            // Check credentials
            const user = validCredentials.find(
                cred => cred.username === username && cred.password === password
            );
            
            if (user) {
                // Success
                loginSuccess.classList.add('visible');
                
                // Store session
                sessionStorage.setItem('isLoggedIn', 'true');
                sessionStorage.setItem('currentUser', JSON.stringify({
                    username: user.username,
                    role: user.role,
                    loginTime: new Date().toISOString()
                }));
                
                // Remember username if checked
                if (rememberCheckbox.checked) {
                    localStorage.setItem('rememberedUsername', username);
                } else {
                    localStorage.removeItem('rememberedUsername');
                }
                
                // Dispatch login event
                window.dispatchEvent(new CustomEvent('loginSuccess', { detail: user }));
                
                // Redirect to dashboard after delay
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } else {
                // Failure
                loginError.classList.add('visible');
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
                
                // Dispatch login event
                window.dispatchEvent(new CustomEvent('loginFailed', { 
                    detail: { username, reason: 'Invalid credentials' }
                }));
            }
        });
        
        // Clear error on input
        usernameInput.addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('usernameError').classList.remove('visible');
            loginError.classList.remove('visible');
        });
        
        passwordInput.addEventListener('input', function() {
            this.classList.remove('error');
            document.getElementById('passwordError').classList.remove('visible');
            loginError.classList.remove('visible');
        });
        
        // Expose for testing
        window.validCredentials = validCredentials;
        window.isLoggedIn = () => sessionStorage.getItem('isLoggedIn') === 'true';
        window.getCurrentUser = () => JSON.parse(sessionStorage.getItem('currentUser'));
        window.logout = function() {
            sessionStorage.removeItem('isLoggedIn');
            sessionStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        };
        
        // Auto-fill for testing
        window.fillCredentials = function(username, password) {
            usernameInput.value = username;
            passwordInput.value = password;
        };
        
        // Mark page loaded
        window.loginPageLoaded = true;
        window.dispatchEvent(new CustomEvent('loginPageReady'));
    </script>
</body>
</html>
